<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Per-host canonical + og:url before first paint (same rules as src/seo.ts canonicalUrl). Avoids all hosts inheriting lp.sooner.sh as canonical from static HTML. -->
    <script>
      (function () {
        try {
          if (!location.protocol || location.protocol === "file:") return;
          var proto = location.protocol;
          var hostname = location.hostname.toLowerCase();
          var path = location.pathname || "/";
          if (path === "") path = "/";
          var canon;
          if (hostname.startsWith("blog.") || hostname.startsWith("lp.")) {
            canon = proto + "//" + hostname + path;
          } else if (hostname === "sooner.sh" || hostname === "www.sooner.sh") {
            canon = "https://sooner.sh" + path;
          } else if (hostname.indexOf("signup.") === 0 && hostname.slice(-10) === ".sooner.sh") {
            canon = "https://sooner.sh/signup";
          } else if (
            (hostname.indexOf("signin.") === 0 || hostname.indexOf("login.") === 0) &&
            hostname.slice(-10) === ".sooner.sh"
          ) {
            canon = "https://sooner.sh/signin";
          } else {
            canon = proto + "//" + hostname + path + (location.search || "");
          }
          var link = document.createElement("link");
          link.setAttribute("rel", "canonical");
          link.setAttribute("href", canon);
          document.head.appendChild(link);
          var og = document.createElement("meta");
          og.setAttribute("property", "og:url");
          og.setAttribute("content", canon);
          document.head.appendChild(og);
        } catch (e) { /* ignore */ }
      })();
    </script>
    <meta name="google" content="notranslate" />
    <meta name="description" content="Sooner is an AI-native IDE in your browser. Describe what you want, get production-ready code, live preview, Git, terminal, and Firebase sync. Build sooner, ship faster." />
    <meta name="keywords" content="Sooner, AI IDE, AI-native IDE, browser IDE, online code editor, AI coding assistant, web development, Monaco editor, Gemini AI, cloud IDE, code generation, live preview, Git integration" />
    <meta name="author" content="Sooner" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="theme-color" content="#09090B" />
    <meta property="og:title" content="Sooner — Build sooner, ship faster | AI-native IDE" />
    <meta property="og:description" content="AI-native IDE in your browser. Describe what you want — AI builds, previews, and ships your code in seconds. No install needed." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sooner" />
    <meta property="og:image" content="https://lp.sooner.sh/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sooner — AI-native IDE" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sooner — Build sooner, ship faster" />
    <meta name="twitter:description" content="AI-native IDE in your browser. Build, preview, and ship from one place." />
    <meta name="twitter:image" content="https://lp.sooner.sh/og-image.png" />
    <title>Sooner — Build sooner, ship faster | AI-native IDE in the browser</title>
    <link rel="icon" type="image/png" href="/sooner-icon.png" />
    <link rel="apple-touch-icon" href="/sooner-icon.png" />
    <!-- Host-specific JSON-LD: avoid serving SoftwareApplication + sooner.sh WebSite on blog (causes GSC duplicate canonical clusters). -->
    <script>
      (function () {
        try {
          if (!location.protocol || location.protocol === "file:") return;
          var h = location.hostname.toLowerCase();
          function setMeta(sel, attr, val) {
            var el = document.head.querySelector(sel);
            if (!el) return;
            el.setAttribute(attr, val);
          }
          function injectLd(obj) {
            var s = document.createElement("script");
            s.type = "application/ld+json";
            s.setAttribute("data-sooner-inline-ld", "1");
            s.textContent = JSON.stringify(obj);
            document.head.appendChild(s);
          }
          var OG = "https://lp.sooner.sh/og-image.png";
          if (h.indexOf("blog.") === 0) {
            var blogDesc =
              "Product updates, tips, and tutorials from the Sooner team. Learn about the AI-native IDE, web development, and how to ship faster.";
            var blogTitle = "Sooner Blog — News, tutorials & updates | AI-native IDE";
            document.title = blogTitle;
            setMeta('meta[name="description"]', "content", blogDesc);
            setMeta('meta[property="og:title"]', "content", "Sooner Blog — News & tutorials");
            setMeta('meta[property="og:description"]', "content", blogDesc);
            setMeta('meta[name="twitter:title"]', "content", "Sooner Blog — News & tutorials");
            setMeta('meta[name="twitter:description"]', "content", blogDesc);
            setMeta('meta[name="keywords"]', "content", "Sooner blog, AI IDE tutorials, web development tips, browser IDE updates, Sooner news");
            var org = {
              "@context": "https://schema.org",
              "@type": "Organization",
              name: "Sooner",
              url: "https://sooner.sh/",
              logo: OG,
            };
            var blogSite = {
              "@context": "https://schema.org",
              "@type": "WebSite",
              name: "Sooner Blog",
              url: "https://blog.sooner.sh/",
              description: blogDesc,
              inLanguage: ["en", "ja"],
              publisher: org,
            };
            var blog = {
              "@context": "https://schema.org",
              "@type": "Blog",
              name: "Sooner Blog",
              url: "https://blog.sooner.sh/",
              description: blogDesc,
              publisher: { "@type": "Organization", name: "Sooner", logo: { "@type": "ImageObject", url: OG } },
              mainEntityOfPage: { "@type": "WebPage", "@id": "https://blog.sooner.sh/" },
            };
            injectLd(org);
            injectLd(blogSite);
            injectLd(blog);
            return;
          }
          injectLd({
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            name: "Sooner",
            applicationCategory: "DeveloperApplication",
            operatingSystem: "Web",
            url: "https://sooner.sh/",
            description:
              "Sooner is an AI-native IDE in your browser. Describe what you want, get production-ready code, live preview, and ship instantly.",
            offers: { "@type": "Offer", price: "0", priceCurrency: "USD" },
            author: { "@type": "Organization", name: "Sooner", url: "https://sooner.sh/" },
          });
          injectLd({
            "@context": "https://schema.org",
            "@type": "WebSite",
            name: "Sooner",
            url: "https://sooner.sh/",
            description: "AI-native IDE in your browser. Build sooner, ship faster.",
            inLanguage: ["en", "ja"],
            publisher: { "@type": "Organization", name: "Sooner", url: "https://sooner.sh/" },
          });
          injectLd({
            "@context": "https://schema.org",
            "@type": "FAQPage",
            mainEntity: [
              {
                "@type": "Question",
                name: "What is Sooner?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text: "Sooner is a browser-based AI-native IDE. Describe what you want in natural language and AI builds, previews, and ships your code in seconds. No installation required.",
                },
              },
              {
                "@type": "Question",
                name: "Is Sooner free?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text: "Yes, Sooner is free to use. Sign up with email, Google, or GitHub and start building immediately.",
                },
              },
              {
                "@type": "Question",
                name: "What programming languages does Sooner support?",
                acceptedAnswer: {
                  "@type": "Answer",
                  text: "Sooner supports JavaScript, TypeScript, Python, Go, Rust, HTML/CSS, and popular frameworks like React, Vue, Next.js, and Three.js.",
                },
              },
            ],
          });
          injectLd({
            "@context": "https://schema.org",
            "@type": "ItemList",
            name: "Sooner primary navigation",
            itemListElement: [
              { "@type": "ListItem", position: 1, name: "Sooner", item: "https://sooner.sh/" },
              { "@type": "ListItem", position: 2, name: "Sign up", item: "https://sooner.sh/signup" },
              { "@type": "ListItem", position: 3, name: "Sign in", item: "https://sooner.sh/signin" },
              { "@type": "ListItem", position: 4, name: "Blog", item: "https://blog.sooner.sh/" },
              { "@type": "ListItem", position: 5, name: "Landing page", item: "https://lp.sooner.sh/" },
            ],
          });
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <script>
      (function() {
        var origError = console.error;
        var origWarn = console.warn;
        var origInfo = console.info;
        var suppress = ['[vite] failed to connect to websocket', 'React DevTools', 'Download the React DevTools'];
        function shouldSuppress(args) {
          var s = typeof args[0] === 'string' ? args[0] : '';
          for (var i = 0; i < suppress.length; i++) { if (s.indexOf(suppress[i]) !== -1) return true; }
          return false;
        }
        console.error = function() { if (!shouldSuppress(arguments)) origError.apply(console, arguments); };
        console.warn = function() { if (!shouldSuppress(arguments)) origWarn.apply(console, arguments); };
        console.info = function() { if (!shouldSuppress(arguments)) origInfo.apply(console, arguments); };
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && event.reason.message && event.reason.message.indexOf('WebSocket closed without opened') !== -1) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

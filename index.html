<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta name="description" content="Sooner — AI-native IDE in your browser. Build, preview, and ship from one place." />
    <meta name="theme-color" content="#09090B" />
    <meta property="og:title" content="Sooner" />
    <meta property="og:description" content="Build sooner, ship faster. AI-native IDE with live preview and cloud sync." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://site.sooner.sh/sooner-icon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://site.sooner.sh/sooner-icon.svg" />
    <title>Sooner</title>
    <link rel="icon" type="image/svg+xml" href="/sooner-icon.svg" />
    <link rel="apple-touch-icon" href="/sooner-icon.svg" />
    <script>
      (function() {
        var origError = console.error;
        var origWarn = console.warn;
        var origInfo = console.info;
        var suppress = ['[vite] failed to connect to websocket', 'React DevTools', 'Download the React DevTools'];
        function shouldSuppress(args) {
          var s = typeof args[0] === 'string' ? args[0] : '';
          for (var i = 0; i < suppress.length; i++) { if (s.indexOf(suppress[i]) !== -1) return true; }
          return false;
        }
        console.error = function() { if (!shouldSuppress(arguments)) origError.apply(console, arguments); };
        console.warn = function() { if (!shouldSuppress(arguments)) origWarn.apply(console, arguments); };
        console.info = function() { if (!shouldSuppress(arguments)) origInfo.apply(console, arguments); };
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && event.reason.message && event.reason.message.indexOf('WebSocket closed without opened') !== -1) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
